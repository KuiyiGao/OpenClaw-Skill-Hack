#cloud-config
# 通用一次性 VM 引导（AWS EC2 / Aliyun ECS 均可作为 user-data）。
# 只做"装好 Docker + 建非 root 用户"，不放任何密钥；代码与 API key 之后再传入。
package_update: true
package_upgrade: false

packages:
  - ca-certificates
  - curl
  - git
  - rsync
  - jq

users:
  - name: lab
    groups: [docker]
    shell: /bin/bash
    sudo: ['ALL=(ALL) NOPASSWD:ALL']

write_files:
  - path: /etc/profile.d/asshack.sh
    content: |
      echo "[asshack 一次性实验 VM] 用法："
      echo "  1) 从本机把项目同步上来： rsync -az ./AgentSkillsHack lab@<VM_IP>:~/"
      echo "  2) cd ~/AgentSkillsHack && ./sandbox/run_sandbox.sh        # 离线攻防(零出网)"
      echo "  3) 真实 agent： 编辑 sandbox/proxy/allowlist.txt 后 docker compose --profile live up"
      echo "  ⚠️ 用完即焚：销毁本实例（见 deploy/aws 或 deploy/aliyun 的 teardown）。"

runcmd:
  # 官方 convenience 脚本安装 Docker（也可换成各发行版仓库）
  - [ bash, -c, "curl -fsSL https://get.docker.com | sh" ]
  - [ systemctl, enable, --now, docker ]
  - [ usermod, -aG, docker, lab ]
  # 收紧本机出向（云安全组才是主防线；这里仅作纵深补充，按需启用）
  # - [ bash, -c, "iptables -P OUTPUT DROP; ..." ]

final_message: "asshack 一次性实验 VM 就绪。请 rsync 代码后在隔离容器内运行；用完销毁。"

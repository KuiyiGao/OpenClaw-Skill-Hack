# OpenClaw isolation lab (real LLM). Three services:
#   egress-proxy : allowlist proxy -- only the LLM domain from .env is reachable
#   openclaw     : real OpenClaw, internal-only network, all egress via the proxy
#   canary       : internal honeypot tripwire
#
# Safety invariants:
#   - openclaw is on an internal-only network (no direct internet, no cloud metadata route)
#   - the only egress path is the proxy, which allows only EGRESS_ALLOW (metadata denied)
#   - non-root, read-only rootfs, cap_drop ALL, no-new-privileges, no host mounts
#   - the only secret in the openclaw container is LLM_API_KEY (from .env)
name: openclaw-lab

networks:
  internal:
    internal: true
  egress:
    driver: bridge

volumes:
  openclaw-state:   # persists ~/.openclaw (config + installed skills) across restarts

services:
  egress-proxy:
    image: asshack-openclaw:latest
    entrypoint: ["python3"]
    command: ["/app/sandbox/egress_proxy.py"]
    networks: [internal, egress]
    environment:
      - EGRESS_ALLOW=${EGRESS_ALLOW:-api.deepseek.com}
    user: "65532:65532"
    read_only: true
    tmpfs: [ /tmp ]
    cap_drop: [ALL]
    security_opt: [ "no-new-privileges:true" ]
    mem_limit: 128m
    restart: "no"

  canary:
    image: asshack-openclaw:latest
    entrypoint: ["python3"]
    command: ["/app/sandbox/canary.py"]
    networks: [internal]
    user: "65532:65532"
    read_only: true
    tmpfs: [ /tmp ]
    cap_drop: [ALL]
    security_opt: [ "no-new-privileges:true" ]
    mem_limit: 128m
    restart: "no"

  openclaw:
    image: asshack-openclaw:latest
    build:
      context: ..
      dockerfile: sandbox/Dockerfile.openclaw
    depends_on: [egress-proxy, canary]
    networks: [internal]
    user: "65532:65532"
    environment:
      - HOME=/home/lab
      - LLM_API_KEY=${LLM_API_KEY:?set LLM_API_KEY in sandbox/.env}
      - LLM_MODEL=${LLM_MODEL:-deepseek-chat}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.deepseek.com/v1}
      - LLM_API=${LLM_API:-openai-completions}
      - HTTPS_PROXY=http://egress-proxy:3128
      - HTTP_PROXY=http://egress-proxy:3128
      - NO_PROXY=canary,localhost,127.0.0.1
      - CANARY_URL=http://canary:8088
    volumes:
      - openclaw-state:/home/lab/.openclaw
    read_only: true
    tmpfs:
      - /tmp:size=128m
    cap_drop: [ALL]
    security_opt: [ "no-new-privileges:true" ]
    pids_limit: 512
    mem_limit: 1g
    restart: "no"
    command: ["tail", "-f", "/dev/null"]
